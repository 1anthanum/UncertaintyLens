name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with black
        run: black --check uncertainty_lens/ tests/

      - name: Run unit tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short

      - name: Run core benchmark (39 checks)
        run: PYTHONPATH=. python examples/benchmark_all.py

      - name: Run blind test (25 checks)
        run: PYTHONPATH=. python examples/benchmark_blind.py

      - name: Run extended test (27 checks)
        run: PYTHONPATH=. python examples/benchmark_extended.py
